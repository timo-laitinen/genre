<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Backgrounds - Genre</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #008080;
            background-image:
                    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px);
            font-family: "MS Sans Serif", "Microsoft Sans Serif", sans-serif;
            padding: 10px;
            color: #000000;
        }

        .window {
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            box-shadow: 2px 2px 0px #808080;
            margin-bottom: 10px;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: #ffffff;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 11pt;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
        }

        .title-bar-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000000;
            border-bottom: 1px solid #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7pt;
            font-weight: normal;
            cursor: pointer;
            font-family: "Marlett", "Webdings", monospace;
            line-height: 1;
            padding-bottom: 2px;
        }

        .title-bar-button:active {
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        .minimize-button::before {
            content: "";
            width: 6px;
            height: 2px;
            background-color: #000000;
            display: block;
            margin-bottom: 3px;
        }

        .maximize-button::before {
            content: "";
            width: 8px;
            height: 8px;
            border: 1px solid #000000;
            border-top: 2px solid #000000;
            display: block;
        }

        .close-button {
            font-size: 9pt;
            font-weight: bold;
            color: #000000;
        }

        .window-content {
            padding: 10px;
            background-color: #c0c0c0;
        }

        h1 {
            font-size: 14pt;
            font-weight: bold;
            margin-bottom: 8px;
            color: #000080;
        }

        h2 {
            font-size: 12pt;
            font-weight: bold;
            margin: 12px 0 6px 0;
            color: #000080;
        }

        p {
            font-size: 10pt;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        a {
            color: #0000ff;
            text-decoration: underline;
        }

        a:visited {
            color: #800080;
        }

        .panel {
            background-color: #c0c0c0;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 10px;
            margin: 10px 0;
        }

        .panel-raised {
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 8px;
            margin: 8px 0;
        }

        .status-bar {
            border-top: 1px solid #ffffff;
            padding: 2px 5px;
            font-size: 9pt;
            background-color: #c0c0c0;
            display: flex;
            gap: 10px;
        }

        .status-item {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 2px 8px;
        }

        .preview-container {
            text-align: center;
            margin: 20px 0;
        }

        .preview-window {
            display: inline-block;
            background-color: #000000;
            padding: 3px;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
        }

        .preview-window img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .info-panel {
            margin-top: 15px;
        }

        code {
            font-family: "Courier New", monospace;
            background-color: #ffffff;
            padding: 2px 4px;
            border: 1px solid #808080;
        }
    </style>
</head>
<body>
<div class="window" style="max-width: 900px; margin: 20px auto;">
    <div class="title-bar">
        <div class="title-bar-text">
            <span>🖼️</span>
            <span>Windows 95 Backgrounds</span>
        </div>
        <div class="title-bar-controls">
            <div class="title-bar-button minimize-button"></div>
            <div class="title-bar-button maximize-button"></div>
            <div class="title-bar-button close-button">✕</div>
        </div>
    </div>

    <div class="window-content">
        <div class="panel-raised">
            <h1>🌄 Windows 95 Backgrounds</h1>
        </div>

        <h2>Featured Background</h2>

        <div class="preview-container">
            <div class="preview-window">
                <img src="../images/glitch-background.png" alt="Glitch Mountain Landscape">
            </div>
        </div>



        <div class="panel" style="background-color: #ffffcc; border: 2px solid #808080;">
            <p><b>💡 Tip:</b> Right-click the image above to save it to your computer and use it as your desktop background!</p>
        </div>

        <p style="text-align: center; margin-top: 20px;">
            <a href="../index.html">← Back to Home</a>
        </p>
    </div>

    <div class="status-bar">
        <div class="status-item">1 image</div>
        <div class="status-item">Ready</div>
        <div class="status-item" id="clock"><script>document.write(new Date().toLocaleTimeString('fi-FI'));</script></div>
    </div>
</div>

<script>
    setInterval(() => {
        const clockElement = document.getElementById('clock');
        if (clockElement) {
            clockElement.textContent = new Date().toLocaleTimeString('fi-FI');
        }
    }, 1000);
</script>
</body>
</html>
